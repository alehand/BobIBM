<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Recetas por Ingredientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍳 Buscador de Recetas</h1>
            <p class="subtitle">Ingresa tus ingredientes y encuentra la receta perfecta</p>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <label for="ingredients">Ingredientes disponibles:</label>
                    <textarea 
                        id="ingredients" 
                        placeholder="Ejemplo: pollo, arroz, tomate, cebolla..."
                        rows="4"
                    ></textarea>
                </div>
                
                <button id="searchBtn" class="search-btn">
                    <span class="btn-text">Buscar Recetas</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </section>

            <section class="results-section">
                <h2>Resultados</h2>
                <div id="results" class="results-container">
                    <div class="empty-state">
                        <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
                            <circle cx="50" cy="50" r="40" stroke="#e0e0e0" stroke-width="2"/>
                            <path d="M35 50 L45 60 L65 40" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                        <p>Ingresa ingredientes y presiona "Buscar Recetas" para comenzar</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by IBM ICA Agentic Workflow</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
